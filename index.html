<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>線上著色｜內建PNG線稿＋多工具版</title>
  <style>
    body { font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif; margin: 16px; }
    .bar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
    .tag { padding:2px 10px; border:1px solid #ccc; border-radius:999px; }
    .wrap {
      width: min(1100px, 100%);
      height: 72vh;
      border: 1px solid #ddd;
      border-radius: 10px;
      overflow: auto;
      background: #fafafa;
      padding: 12px;
      box-sizing: border-box;
    }
    #stage {
      position: relative;
      transform-origin: top left;
      background: white;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }
    canvas { position:absolute; left:0; top:0; display:block; }
    #paint { z-index: 1; pointer-events:auto; }
    #preview { z-index: 2; pointer-events:none; }
    /* 顯示時用 multiply：白底 PNG 線稿不會蓋住下層顏色 */
    #lineart {
      z-index: 3;
      pointer-events: none;
      mix-blend-mode: multiply;
    }
    /* 避免觸控/滑動吃掉 pointer（桌機不影響） */
    #paint, #preview, #lineart { touch-action: none; }

    button { padding: 6px 10px; }
    select { padding: 6px 8px; }
    input[type="range"] { width: 140px; }
    .hint { color:#555; font-size:13px; line-height:1.5; margin-top:10px; }
    .group { display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding:6px 8px; border:1px dashed #ddd; border-radius:10px; background:#fff; }
    .label { font-size:13px; color:#333; }
  </style>
</head>

<body>
  <div class="bar">
    <div class="group">
      <span class="label">內建線稿</span>
      <select id="presetSelect"></select>
      <button id="loadPreset">載入</button>
      <span id="infoTag" class="tag">尚未載入線稿</span>
    </div>

    <div class="group">
      <span class="label">工具</span>
      <select id="tool">
        <option value="brush">筆刷</option>
        <option value="eraser">橡皮擦</option>
        <option value="line">直線</option>
        <option value="rect">矩形</option>
        <option value="circle">圓形/橢圓</option>
        <option value="pan">移動(拖曳)</option>
        <option value="eyedropper">吸管</option>
      </select>
      <span id="modeTag" class="tag">工具：筆刷</span>
    </div>

    <div class="group">
      <span class="label">顏色</span>
      <input type="color" id="color" value="#ff3b30" />
      <span class="label">筆刷</span>
      <input type="range" id="size" min="1" max="80" value="14" />
      <span class="label">透明度</span>
      <input id="alpha" type="range" min="0" max="1" step="0.05" value="1" />
      <span class="label">平滑</span>
      <input id="smooth" type="range" min="0" max="0.8" step="0.05" value="0.25" />
    </div>

    <div class="group">
      <button id="undo">復原</button>
      <button id="redo">重做</button>
      <button id="clear">清空塗色</button>
      <button id="export">下載PNG</button>
    </div>

    <div class="group">
      <button id="zoomIn">放大</button>
      <button id="zoomOut">縮小</button>
      <button id="fit">適合視窗</button>
      <button id="bgWhite">背景白</button>
      <button id="bgClear">背景透明</button>
    </div>
  </div>

  <div class="wrap" id="wrap">
    <div id="stage">
      <canvas id="paint"></canvas>
      <canvas id="preview"></canvas>
      <canvas id="lineart"></canvas>
    </div>
  </div>

<script>
(() => {
  // ===== 你只要改這裡：PNG 線稿清單路徑（相對於 index.html）=====
  const LINEARTS = [
    { id: "shapes",  title: "幾何圖形",  src: "coloring.png" },
    { id: "house",   title: "小房子",    src: "images.png" },
    { id: "mandala", title: "曼陀羅-01", src: "pngtree.png" }
  ];

  // ===== DOM =====
  const wrap = document.getElementById('wrap');
  const stage = document.getElementById('stage');

  const paint = document.getElementById('paint');
  const preview = document.getElementById('preview');
  const lineart = document.getElementById('lineart');

  const pctx = paint.getContext('2d', { willReadFrequently: true });
  const vctx = preview.getContext('2d', { willReadFrequently: true });
  const lctx = lineart.getContext('2d');

  const presetSelect = document.getElementById('presetSelect');
  const infoTag = document.getElementById('infoTag');
  const modeTag = document.getElementById('modeTag');

  const toolEl = document.getElementById('tool');
  const colorEl = document.getElementById('color');
  const sizeEl  = document.getElementById('size');
  const alphaEl = document.getElementById('alpha');
  const smoothEl = document.getElementById('smooth');

  // ===== 設定 =====
  const MAX_IMAGE_SIDE = 2800;
  const MAX_HISTORY = 20;

  // ===== 狀態 =====
  let tool = toolEl.value;

  let drawing = false;
  let last = null;

  let undoStack = [];
  let redoStack = [];

  // 視圖狀態（只影響顯示與座標換算）
  let view = { scale: 1, tx: 0, ty: 0 };
  let panning = false;
  let panStart = null;

  // 形狀工具狀態
  let shapeStart = null;

  // ===== UI 初始化 =====
  LINEARTS.forEach((it, idx) => {
    const opt = document.createElement('option');
    opt.value = it.id;
    opt.textContent = `${idx + 1}. ${it.title}`;
    presetSelect.appendChild(opt);
  });

  function setModeTag() {
    const map = {
      brush: "筆刷",
      eraser: "橡皮擦",
      line: "直線",
      rect: "矩形",
      circle: "圓形/橢圓",
      pan: "移動(拖曳)",
      eyedropper: "吸管"
    };
    modeTag.textContent = `工具：${map[tool] ?? tool}`;
  }
  setModeTag();

  toolEl.addEventListener('change', () => {
    tool = toolEl.value;
    setModeTag();
    // 避免工具切換時留下預覽
    vctx.clearRect(0, 0, preview.width, preview.height);
    shapeStart = null;
    drawing = false;
    panning = false;
  });

  // ===== 工具：縮到 maxSide =====
  function computeScaleToMax(w, h, maxSide) {
    const side = Math.max(w, h);
    return side > maxSide ? (maxSide / side) : 1;
  }

  // ===== Undo/Redo（只存塗色層）=====
  function snapshot() {
    const img = pctx.getImageData(0, 0, paint.width, paint.height);
    undoStack.push(img);
    if (undoStack.length > MAX_HISTORY) undoStack.shift();
    redoStack = [];
  }

  function restore(imageData) {
    pctx.clearRect(0, 0, paint.width, paint.height);
    pctx.putImageData(imageData, 0, 0);
  }

  function canUndo() { return undoStack.length > 1; }
  function canRedo() { return redoStack.length > 0; }

  // ===== 顯示縮放/平移 =====
  function applyViewTransform() {
    stage.style.transformOrigin = 'top left';
    stage.style.transform = `translate(${view.tx}px, ${view.ty}px) scale(${view.scale})`;
  }

  function fitToWrap() {
    const padding = 24;
    const availW = wrap.clientWidth - padding;
    const availH = wrap.clientHeight - padding;
    const W = paint.width, H = paint.height;
    if (!W || !H) return;

    const s = Math.min(1, availW / W, availH / H);
    view.scale = s;
    view.tx = 0;
    view.ty = 0;
    applyViewTransform();
  }

  window.addEventListener('resize', () => fitToWrap());

  // ===== 依線稿自動調整畫布尺寸（像素）並同步 CSS 尺寸 =====
  function setCanvasesToImage(img, label="") {
    const s = computeScaleToMax(img.width, img.height, MAX_IMAGE_SIDE);
    const W = Math.round(img.width * s);
    const H = Math.round(img.height * s);

    // 像素尺寸（會清空）
    paint.width = W; paint.height = H;
    preview.width = W; preview.height = H;
    lineart.width = W; lineart.height = H;

    // CSS 尺寸（避免事件/座標怪異）
    paint.style.width = `${W}px`; paint.style.height = `${H}px`;
    preview.style.width = `${W}px`; preview.style.height = `${H}px`;
    lineart.style.width = `${W}px`; lineart.style.height = `${H}px`;

    stage.style.width = `${W}px`;
    stage.style.height = `${H}px`;

    // 清空並畫線稿
    pctx.clearRect(0, 0, W, H);
    vctx.clearRect(0, 0, W, H);
    lctx.clearRect(0, 0, W, H);
    lctx.drawImage(img, 0, 0, W, H);

    // reset history
    undoStack = [];
    redoStack = [];
    snapshot();

    infoTag.textContent = `${label} 原圖：${img.width}×${img.height} → 畫布：${W}×${H}`;
    fitToWrap();
  }

  // ===== 載入 PNG 線稿 =====
  function loadLineartFromURL(src, title="") {
    const img = new Image();
    // 若未來使用外部網域圖片，可能需要：img.crossOrigin = "anonymous";
    img.onload = () => setCanvasesToImage(img, `線稿：${title}`);
    img.onerror = () => infoTag.textContent = `載入失敗：${title}（請檢查路徑）`;
    img.src = src;
  }

  document.getElementById('loadPreset').addEventListener('click', () => {
    const id = presetSelect.value;
    const item = LINEARTS.find(x => x.id === id);
    if (!item) return;
    loadLineartFromURL(item.src, item.title);
  });

  // 預設載入第一張
  if (LINEARTS.length) loadLineartFromURL(LINEARTS[0].src, LINEARTS[0].title);

  // ===== 座標換算（支援 translate + scale）=====
  function getPos(ev) {
    const rect = paint.getBoundingClientRect();
    const x = (ev.clientX - rect.left) * (paint.width / rect.width);
    const y = (ev.clientY - rect.top)  * (paint.height / rect.height);
    return { x, y };
  }

  // ===== 筆刷樣式（含透明度/平滑）=====
  function applyBrushStyle(ctx) {
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = Number(sizeEl.value);

    const a = Number(alphaEl.value);
    ctx.globalAlpha = a;

    const smooth = Number(smoothEl.value);
    ctx.shadowColor = 'rgba(0,0,0,0.08)';
    ctx.shadowBlur = ctx.lineWidth * smooth;

    if (tool === 'brush') {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = colorEl.value;
    } else if (tool === 'eraser') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.strokeStyle = 'rgba(0,0,0,1)'; // 顏色無所謂
      ctx.shadowBlur = 0;
    } else {
      // 形狀預覽/一般畫線
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = colorEl.value;
    }
  }

  // ===== 形狀預覽 =====
  function drawShapePreview(start, end) {
    vctx.clearRect(0, 0, preview.width, preview.height);

    applyBrushStyle(vctx);
    vctx.globalCompositeOperation = 'source-over';
    vctx.strokeStyle = colorEl.value;

    const x1 = start.x, y1 = start.y;
    const x2 = end.x, y2 = end.y;

    vctx.beginPath();
    if (tool === 'line') {
      vctx.moveTo(x1, y1);
      vctx.lineTo(x2, y2);
    } else if (tool === 'rect') {
      vctx.rect(Math.min(x1,x2), Math.min(y1,y2), Math.abs(x2-x1), Math.abs(y2-y1));
    } else if (tool === 'circle') {
      const cx = (x1 + x2) / 2;
      const cy = (y1 + y2) / 2;
      const rx = Math.abs(x2 - x1) / 2;
      const ry = Math.abs(y2 - y1) / 2;
      vctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    }
    vctx.stroke();
  }

  function commitPreviewToPaint() {
    pctx.save();
    pctx.globalAlpha = 1;
    pctx.globalCompositeOperation = 'source-over';
    pctx.drawImage(preview, 0, 0);
    pctx.restore();

    vctx.clearRect(0, 0, preview.width, preview.height);
  }

  // ===== 吸管（從合成畫面取色：paint + multiply(lineart)）=====
  function pickColorAt(x, y) {
    const tmp = document.createElement('canvas');
    tmp.width = paint.width;
    tmp.height = paint.height;
    const t = tmp.getContext('2d', { willReadFrequently: true });

    // 先畫塗色
    t.globalCompositeOperation = 'source-over';
    t.drawImage(paint, 0, 0);

    // 再用 multiply 疊線稿（與匯出一致）
    t.globalCompositeOperation = 'multiply';
    t.drawImage(lineart, 0, 0);

    const d = t.getImageData(Math.round(x), Math.round(y), 1, 1).data;
    const [r,g,b,a] = d;
    if (a === 0) return null;
    return `#${[r,g,b].map(v => v.toString(16).padStart(2,'0')).join('')}`;
  }

  // ===== Pointer 事件：整合多工具 =====
  paint.addEventListener('pointerdown', (ev) => {
    ev.preventDefault();
    if (!paint.width || !paint.height) return;

    const pos = getPos(ev);

    if (tool === 'pan') {
      panning = true;
      panStart = { x: ev.clientX, y: ev.clientY, tx: view.tx, ty: view.ty };
      paint.setPointerCapture(ev.pointerId);
      return;
    }

    if (tool === 'eyedropper') {
      const hex = pickColorAt(pos.x, pos.y);
      if (hex) colorEl.value = hex;
      return;
    }

    if (tool === 'line' || tool === 'rect' || tool === 'circle') {
      shapeStart = pos;
      drawShapePreview(shapeStart, pos);
      paint.setPointerCapture(ev.pointerId);
      return;
    }

    // brush / eraser
    drawing = true;
    last = pos;
    paint.setPointerCapture(ev.pointerId);
  }, { passive: false });

  paint.addEventListener('pointermove', (ev) => {
    ev.preventDefault();
    if (!paint.width || !paint.height) return;

    const pos = getPos(ev);

    if (panning && tool === 'pan') {
      const dx = ev.clientX - panStart.x;
      const dy = ev.clientY - panStart.y;
      view.tx = panStart.tx + dx;
      view.ty = panStart.ty + dy;
      applyViewTransform();
      return;
    }

    if (shapeStart && (tool === 'line' || tool === 'rect' || tool === 'circle')) {
      drawShapePreview(shapeStart, pos);
      return;
    }

    if (!drawing) return;

    applyBrushStyle(pctx);
    pctx.beginPath();
    pctx.moveTo(last.x, last.y);
    pctx.lineTo(pos.x, pos.y);
    pctx.stroke();
    last = pos;
  }, { passive: false });

  function endAnyStroke() {
    if (panning) {
      panning = false;
      panStart = null;
      return;
    }

    if (shapeStart) {
      commitPreviewToPaint();
      shapeStart = null;
      snapshot();
      return;
    }

    if (!drawing) return;
    drawing = false;
    last = null;
    snapshot();
  }

  paint.addEventListener('pointerup', (ev) => { ev.preventDefault(); endAnyStroke(); }, { passive: false });
  paint.addEventListener('pointercancel', (ev) => { ev.preventDefault(); endAnyStroke(); }, { passive: false });
  paint.addEventListener('pointerleave', (ev) => { ev.preventDefault(); endAnyStroke(); }, { passive: false });

  // ===== Undo/Redo/Clear =====
  document.getElementById('undo').addEventListener('click', () => {
    if (!canUndo()) return;
    const current = undoStack.pop();
    redoStack.push(current);
    restore(undoStack[undoStack.length - 1]);
  });

  document.getElementById('redo').addEventListener('click', () => {
    if (!canRedo()) return;
    const next = redoStack.pop();
    undoStack.push(next);
    restore(next);
  });

  document.getElementById('clear').addEventListener('click', () => {
    if (!paint.width || !paint.height) return;
    pctx.clearRect(0, 0, paint.width, paint.height);
    snapshot();
  });

  // ===== Zoom & Fit & Background =====
  document.getElementById('zoomIn').addEventListener('click', () => {
    view.scale = Math.min(4, view.scale * 1.2);
    applyViewTransform();
  });

  document.getElementById('zoomOut').addEventListener('click', () => {
    view.scale = Math.max(0.15, view.scale / 1.2);
    applyViewTransform();
  });

  document.getElementById('fit').addEventListener('click', () => fitToWrap());

  document.getElementById('bgWhite').addEventListener('click', () => {
    if (!paint.width || !paint.height) return;
    pctx.save();
    pctx.globalCompositeOperation = 'destination-over';
    pctx.globalAlpha = 1;
    pctx.fillStyle = '#ffffff';
    pctx.fillRect(0, 0, paint.width, paint.height);
    pctx.restore();
    snapshot();
  });

  document.getElementById('bgClear').addEventListener('click', () => {
    if (!paint.width || !paint.height) return;
    pctx.clearRect(0, 0, paint.width, paint.height);
    snapshot();
  });

  // ===== Export PNG（paint + multiply(lineart)）=====
  document.getElementById('export').addEventListener('click', () => {
    if (!paint.width || !paint.height) return;

    const out = document.createElement('canvas');
    out.width = paint.width;
    out.height = paint.height;
    const octx = out.getContext('2d');

    // 先畫塗色
    octx.globalCompositeOperation = 'source-over';
    octx.drawImage(paint, 0, 0);

    // 再用 multiply 疊線稿（白底 PNG 不蓋顏色）
    octx.globalCompositeOperation = 'multiply';
    octx.drawImage(lineart, 0, 0);

    // 還原
    octx.globalCompositeOperation = 'source-over';

    const a = document.createElement('a');
    a.download = `coloring-${Date.now()}.png`;
    a.href = out.toDataURL('image/png');
    a.click();
  });

})();
</script>
</body>
</html>
